sonar.projectKey=leapmentor-backend
sonar.projectName=LeapMentor Backend
sonar.host.url=http://localhost:9000
sonar.sources=.

# Files not to analyze
sonar.exclusions=\
coverage/**,\
**/__tests__/**,\
**/*.test.js,\
**/*.spec.js,\
mocks/**,\
fixtures/**,\
**/node_modules/**,\
**/swagger-output.json,\
**/swagger-autogen.js,\
**/*.html

# Files excluded from duplication detection
sonar.cpd.exclusions=\
coverage/**,\
**/*.test.js,\
**/*.spec.js,\
**/*.html

# LCOV report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Files ignored for coverage calculation
sonar.coverage.exclusions=\
server.js,\
app.js,\
swagger.js,\
instrument.js,\
migrate-mongo-config.js,\
jest.config.js,\
jest.setup.env.js,\
eslint.config.js,\
config/**,\
scripts/**,\
migrations/**,\
cron/**,\
socket/**,\
swagger/**,\
routes/**,\
validators/**,\
models/**,\
utils/**,\
**/*.test.js,\
**/*.spec.js,\
**/node_modules/**